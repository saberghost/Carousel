<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>产品详情</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
    }

    /* 顶部轮播 */
    .banner {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #eee;
    }

    .banner-track {
      display: flex;
      transition: transform 0.4s ease;
    }

    .banner-track img {
      flex-shrink: 0;
      width: 100%;
      display: block;
    }

    .banner-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 5;
    }

    .banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.5);
      transition: all 0.3s;
      padding: 0;
      border: none;
    }

    .banner-dot.active {
      width: 18px;
      background: #fff;
    }

    /* 计数器 */
    .counter {
      position: absolute;
      bottom: 10px;
      right: 12px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      z-index: 5;
    }

    /* 返回按钮 */
    .back-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* PC端居中显示手机宽度 */
    @media (min-width: 481px) {
      body {
        background: #e8e8e8;
      }

      .page {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
    }
  </style>
</head>

<body>

  <div class="page">
    <div class="banner" id="banner">
      <button class="back-btn" onclick="history.back()">&#10094;</button>
      <div class="banner-track" id="bannerTrack"></div>
      <div class="banner-dots" id="bannerDots"></div>
      <div class="counter" id="counter"></div>
    </div>
  </div>

  <script>
    const images = [
      'img-exc/主图1.png',
      'img-exc/主图2.png',
      'img-exc/主图3.png',
      'img-exc/主图4.png',
      'img-exc/主图5.png'
    ];

    const bannerTrack = document.getElementById('bannerTrack');
    const bannerDots = document.getElementById('bannerDots');
    const banner = document.getElementById('banner');
    const counter = document.getElementById('counter');

    images.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      img.draggable = false;
      bannerTrack.appendChild(img);

      const dot = document.createElement('button');
      dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      bannerDots.appendChild(dot);
    });

    const dots = bannerDots.querySelectorAll('.banner-dot');
    let current = 0;
    let autoTimer = null;
    let paused = false;

    function updateBanner() {
      bannerTrack.style.transform = 'translateX(-' + (current * 100) + '%)';
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
      counter.textContent = (current + 1) + ' / ' + images.length;
    }

    function goTo(i) {
      current = ((i % images.length) + images.length) % images.length;
      updateBanner();
      resetAuto();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function startAuto() {
      stopAuto();
      autoTimer = setInterval(() => { if (!paused) next(); }, 3000);
    }

    function stopAuto() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }

    function resetAuto() { startAuto(); }

    // 触摸滑动
    let touchStartX = 0;
    banner.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
      paused = true;
    }, { passive: true });

    banner.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 40) {
        diff > 0 ? prev() : next();
      }
      paused = false;
    }, { passive: true });

    banner.addEventListener('mouseenter', () => paused = true);
    banner.addEventListener('mouseleave', () => paused = false);

    updateBanner();
    startAuto();
  </script>

</body>

</html>
