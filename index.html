<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>品牌展示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f5f5f5;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
  -webkit-user-select: none;
  user-select: none;
}

.page {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
}

/* 顶部轮播 */
.banner {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  background: #eee;
}

.banner-track {
  display: flex;
  height: 100%;
  transition: transform 0.4s ease;
}

.banner-track img {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.banner-dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

.banner-dot {
  width: 6px;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.5);
  transition: all 0.3s;
  padding: 0;
  border: none;
}

.banner-dot.active {
  width: 18px;
  background: #fff;
}

/* 下方图片列表 */
.content {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.content img {
  width: 100%;
  display: block;
}

/* PC端居中显示手机宽度 */
@media (min-width: 481px) {
  body { background: #e8e8e8; }
  .page {
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
  }
}
</style>
</head>
<body>

<div class="page">
  <!-- 顶部轮播 -->
  <div class="banner" id="banner">
    <div class="banner-track" id="bannerTrack"></div>
    <div class="banner-dots" id="bannerDots"></div>
  </div>

  <!-- 下方图片列表 -->
  <div class="content" id="content"></div>
</div>

<script>
// 轮播图片
const bannerImages = [
  'img/1-KV2.png',
  'img/5-1热销.png',
  'img/5-2热销.png',
  'img/5-3热销.png'
];

// 列表图片（按文件名顺序）
const listImages = [
  'img/2-标题.png',
  'img/1-KV.png',
  'img/2.png',
  'img/3-机制.png',
  'img/3.png',
  'img/4-导购.png',
  'img/4.png',
  'img/6-肩颈.png',
  'img/7-腹部.png',
  'img/8-「手部系列」.png',
  'img/9-「足部系列」.png',
  'img/10-奖项.png',
  'img/11-营业执照.png',
  'img/12-品牌服务.png',
  'img/13-品牌赞助.png'
];

// 渲染轮播
const bannerTrack = document.getElementById('bannerTrack');
const bannerDots = document.getElementById('bannerDots');
const banner = document.getElementById('banner');

bannerImages.forEach((src, i) => {
  const img = document.createElement('img');
  img.src = src;
  img.alt = '';
  img.draggable = false;
  bannerTrack.appendChild(img);

  const dot = document.createElement('button');
  dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  bannerDots.appendChild(dot);
});

const dots = bannerDots.querySelectorAll('.banner-dot');
let current = 0;
let autoTimer = null;
let paused = false;

function updateBanner() {
  bannerTrack.style.transform = 'translateX(-' + (current * 100) + '%)';
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
}

function goTo(i) {
  current = ((i % bannerImages.length) + bannerImages.length) % bannerImages.length;
  updateBanner();
  resetAuto();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

function startAuto() {
  stopAuto();
  autoTimer = setInterval(() => { if (!paused) next(); }, 3000);
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

function resetAuto() { startAuto(); }

// 触摸滑动
let touchStartX = 0;
banner.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].clientX;
  paused = true;
}, { passive: true });

banner.addEventListener('touchend', (e) => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 40) {
    diff > 0 ? prev() : next();
  }
  paused = false;
}, { passive: true });

banner.addEventListener('mouseenter', () => paused = true);
banner.addEventListener('mouseleave', () => paused = false);

// 渲染列表图片
const content = document.getElementById('content');
listImages.forEach(src => {
  const img = document.createElement('img');
  img.src = src;
  img.alt = '';
  img.loading = 'lazy';
  content.appendChild(img);
});

// 启动
updateBanner();
startAuto();
</script>
</body>
</html>
