<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>品牌展示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

.carousel {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* 进度条 */
.progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  background: rgba(255,255,255,0.8);
  transition: width 0.3s ease;
  z-index: 10;
}

.progress-track {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(255,255,255,0.15);
  z-index: 9;
}

/* 计数器 */
.counter {
  position: absolute;
  top: 16px;
  right: 20px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  z-index: 10;
  letter-spacing: 1px;
}

/* 箭头按钮 */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.2s;
  backdrop-filter: blur(4px);
}

.nav-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: translateY(-50%) scale(1.1);
}

.nav-btn:active {
  transform: translateY(-50%) scale(0.95);
}

.nav-prev { left: 16px; }
.nav-next { right: 16px; }

/* 圆点指示器 */
.dots {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 10;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: none;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  padding: 0;
}

.dot:hover {
  background: rgba(255,255,255,0.5);
}

.dot.active {
  background: rgba(255,255,255,0.9);
  transform: scale(1.3);
}

/* 移动端适配 */
@media (max-width: 768px) {
  .nav-btn {
    width: 40px;
    height: 40px;
    font-size: 16px;
  }
  .nav-prev { left: 8px; }
  .nav-next { right: 8px; }
  .dots { bottom: 12px; gap: 5px; }
  .dot { width: 6px; height: 6px; }
  .counter { top: 12px; right: 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="carousel" id="carousel">
  <div class="progress-track"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="counter" id="counter"></div>

  <button class="nav-btn nav-prev" id="prevBtn" aria-label="上一张">&#10094;</button>
  <button class="nav-btn nav-next" id="nextBtn" aria-label="下一张">&#10095;</button>

  <div class="dots" id="dots"></div>
</div>

<script>
const images = [
  'img/1-KV.png',
  'img/1-KV2.png',
  'img/2-标题.png',
  'img/2.png',
  'img/3-机制.png',
  'img/3.png',
  'img/4-导购.png',
  'img/4.png',
  'img/5-1热销.png',
  'img/5-2热销.png',
  'img/5-3热销.png',
  'img/6-肩颈.png',
  'img/7-腹部.png',
  'img/8-「手部系列」.png',
  'img/9-「足部系列」.png',
  'img/10-奖项.png',
  'img/11-营业执照.png',
  'img/12-品牌服务.png',
  'img/13-品牌赞助.png'
];

const carousel = document.getElementById('carousel');
const dotsContainer = document.getElementById('dots');
const counter = document.getElementById('counter');
const progressBar = document.getElementById('progressBar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

let current = 0;
let autoTimer = null;
let paused = false;
const INTERVAL = 3000;

// 创建幻灯片
const slides = [];
images.forEach((src, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = src;
  img.alt = src.replace(/img\/|\.png/g, '');
  img.draggable = false;
  slide.appendChild(img);
  carousel.insertBefore(slide, carousel.querySelector('.progress-track'));
  slides.push(slide);
});

// 创建圆点
images.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

const dots = dotsContainer.querySelectorAll('.dot');

function updateUI() {
  slides.forEach((s, i) => s.classList.toggle('active', i === current));
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
  counter.textContent = (current + 1) + ' / ' + images.length;
  progressBar.style.width = ((current + 1) / images.length * 100) + '%';
}

function goTo(index) {
  current = ((index % images.length) + images.length) % images.length;
  updateUI();
  resetAuto();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

function startAuto() {
  stopAuto();
  autoTimer = setInterval(() => { if (!paused) next(); }, INTERVAL);
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

function resetAuto() { startAuto(); }

// 事件绑定
prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prev();
  else if (e.key === 'ArrowRight') next();
});

carousel.addEventListener('mouseenter', () => paused = true);
carousel.addEventListener('mouseleave', () => paused = false);

// 触摸滑动
let touchStartX = 0;
carousel.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].clientX;
  paused = true;
}, { passive: true });

carousel.addEventListener('touchend', (e) => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    diff > 0 ? prev() : next();
  }
  paused = false;
}, { passive: true });

// 初始化
updateUI();
startAuto();
</script>
</body>
</html>
